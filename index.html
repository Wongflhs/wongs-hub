<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wong's Hub - Bot Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
min-height: 100vh; color: #fff; padding: 20px;
}
.header { text-align: center; margin-bottom: 30px; }
.header h1 {
font-size: 2rem; margin-bottom: 10px;
background: linear-gradient(90deg, #6366f1, #8b5cf6);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: #94a3b8; font-size: 0.9rem; }
.dashboard { max-width: 1200px; margin: 0 auto; }
.bot-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 20px;
}
.bot-card {
background: rgba(255,255,255,0.05);
border-radius: 16px; padding: 24px;
border: 1px solid rgba(255,255,255,0.1);
position: relative; overflow: hidden;
}
.bot-card::before {
content: ''; position: absolute;
top: 0; left: 0; right: 0; height: 3px;
background: var(--status-color, #22c55e);
}
.bot-card.offline::before { background: #ef4444; }
.bot-header { display: flex; align-items: center; margin-bottom: 16px; }
.bot-avatar {
width: 48px; height: 48px; border-radius: 50%;
background: var(--avatar-bg, #6366f1);
display: flex; align-items: center; justify-content: center;
font-size: 1.5rem; margin-right: 12px; font-weight: bold;
}
.status-badge {
display: inline-flex; align-items: center; gap: 6px;
padding: 6px 12px; border-radius: 20px;
font-size: 0.85rem; font-weight: 500;
}
.status-badge.online { background: rgba(34,197,94,0.2); color: #22c55e; }
.status-badge.offline { background: rgba(239,68,68,0.2); color: #ef4444; }
.footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="header">
<h1>🤖 Wong's Hub - Bot Dashboard</h1>
<p class="subtitle">实时监控 Agent 团队运行状态</p>
</div>
<div class="dashboard">
<div class="bot-grid">
<div class="bot-card" style="--status-color:#22c55e;--avatar-bg:#6366f120;">
<div class="bot-header">
<div class="bot-avatar" style="color:#6366f1;">谢</div>
<div><h3>#001 谢顿</h3><span style="color:#94a3b8">规划师</span></div>
</div>
<div class="status-badge online">🟢 在线</div>
</div>
<div class="bot-card offline" style="--status-color:#ef4444;--avatar-bg:#22c55e20;">
<div class="bot-header">
<div class="bot-avatar" style="color:#22c55e;">哈</div>
<div><h3>#002 哈定</h3><span style="color:#94a3b8">执行者</span></div>
</div>
<div class="status-badge offline">🔴 离线</div>
</div>
<div class="bot-card offline" style="--status-color:#ef4444;--avatar-bg:#f59e0b20;">
<div class="bot-header">
<div class="bot-avatar" style="color:#f59e0b;">里</div>
<div
><h3>#003 里欧斯</h3><span style="color:#94a3b8">探索者</span></div>
</div>
<div class="status-badge offline">🔴 离线</div>
</div>
<div class="bot-card offline" style="--status-color:#ef4444;--avatar-bg:#8b5cf620;">
<div class="bot-header">
<div class="bot-avatar" style="color:#8b5cf6;">帕</div>
<div><h3>#004 帕佛</h3><span style="color:#94a3b8">调查员</span></div>
</div>
<div class="status-badge offline">🔴 离线</div>
</div>
</div>
</div>
<div class="footer">The Seldon Protocol v2.0</div>
</body>
</html>
